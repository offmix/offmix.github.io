<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>カスタム時計</title>
<style>
  :root{
    --clock-color: #ffffff;
    --clock-size: 12vw; /* 画面に応じて大きさを調整 */
    --colon-bg: url("https://o-i-shi.com/wp-content/uploads/2025/05/greenblack-18.jpg");
  }

  html,body{
    height:100%;
    margin:0;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background-color:#000;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color:var(--clock-color);
    overflow:hidden;
  }

  /* 背景スライド用コンテナ */
  .bg{
    position:fixed;
    inset:0;
    z-index:-2;
    background-size:cover;
    background-position:center;
    transition:opacity 1s ease;
  }
  .bg.fade-out{ opacity:0; }
  .bg.fade-in{ opacity:1; }

  /* 半透明オーバーレイで読みやすく */
  .overlay{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.25);
    z-index:-1;
    pointer-events:none;
  }

  /* 時計本体 */
  .clock{
    display:flex;
    align-items:center;
    gap:0.5vw;
    font-weight:600;
    font-size:var(--clock-size);
    line-height:1;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }

  .digits{
    display:flex;
    gap:0.4vw;
    align-items:center;
  }

  .digits span{
    display:inline-block;
    min-width: calc(var(--clock-size) * 0.6);
    text-align:center;
    color:var(--clock-color);
  }

  /* コロンを装飾。背景画像を当て、点滅アニメは「長く点灯して短く消える」 */
  .colon{
    display:inline-block;
    padding:0.1em 0.35em;
    border-radius:0.2em;
    color:var(--clock-color);
    background-image: var(--colon-bg);
    background-size:cover;
    background-position:center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.6) inset;
    -webkit-background-clip: padding-box;
    animation: colon-blink 1s steps(1) infinite;
    font-weight:700;
  }

  /* 70% 表示 / 30% 消灯 の周期（待たせる） */
  @keyframes colon-blink{
    0%   { opacity:1; }
    70%  { opacity:1; }
    100% { opacity:0; }
  }

  /* 日付表示（必要なら） */
  .date{
    margin-top:1rem;
    font-size: calc(var(--clock-size) * 0.14);
    color: rgba(255,255,255,0.9);
    text-align:center;
  }

  /* 小さい画面向け調整 */
  @media (max-width:600px){
    :root{ --clock-size: 18vw; }
    .digits span{ min-width: calc(var(--clock-size) * 0.55); }
  }
</style>
</head>
<body>
  <div id="bg1" class="bg fade-in"></div>
  <div id="bg2" class="bg fade-out"></div>
  <div class="overlay"></div>

  <div>
    <div class="clock" aria-live="polite">
      <div class="digits">
        <span id="hours">00</span>
        <span class="colon" aria-hidden="true">:</span>
        <span id="minutes">00</span>
      </div>
      <div style="font-size:0.35em; align-self:flex-end; margin-left:0.8em; color:rgba(255,255,255,0.85);">
        <span id="seconds" style="font-variant-numeric:tabular-nums;">00</span>
      </div>
    </div>
    <div class="date" id="date"></div>
  </div>

<script>
  // 画像はユーザー提示のURLをそのまま使っています。
  const backgrounds = [
    "https://cdn.pixabay.com/photo/2017/03/28/12/22/snow-mountain-2182016_640.jpg", // 日本アルプス
    "https://www.sapporo.travel/cms/wp-content/uploads/2017/06/%E5%A4%A7%E9%80%9A%E5%85%AC%E5%9C%92_%E9%A6%AC%E6%B8%95%E7%BF%94%E6%A7%98_%E2%98%85DSC08415ps-5-1.jpg", // 札幌大通公園
    "https://upload.wikimedia.org/wikipedia/commons/c/c2/2018_Shibuya_Crossing.jpg" // 渋谷スクランブル交差点
  ];

  // 背景を交互に切り替えるロジック（フェード）
  const bg1 = document.getElementById("bg1");
  const bg2 = document.getElementById("bg2");
  let idx = 0;
  let showing = 1;

  function setBg(el, url){
    el.style.backgroundImage = `url("${url}")`;
  }

  // 初期背景
  setBg(bg1, backgrounds[0]);
  setBg(bg2, backgrounds[1] || backgrounds[0]);
  idx = 1;

  function nextBackground(){
    const nextIndex = (idx + 1) % backgrounds.length;
    if(showing === 1){
      setBg(bg2, backgrounds[nextIndex]);
      bg2.classList.remove("fade-out");
      bg2.classList.add("fade-in");
      bg1.classList.remove("fade-in");
      bg1.classList.add("fade-out");
      showing = 2;
    } else {
      setBg(bg1, backgrounds[nextIndex]);
      bg1.classList.remove("fade-out");
      bg1.classList.add("fade-in");
      bg2.classList.remove("fade-in");
      bg2.classList.add("fade-out");
      showing = 1;
    }
    idx = nextIndex;
  }

  // 7秒ごとに背景切り替え（調整可）
  setInterval(nextBackground, 7000);

  // 時計更新（時・分・秒）
  function pad(n){ return n.toString().padStart(2,"0"); }
  const hoursEl = document.getElementById("hours");
  const minutesEl = document.getElementById("minutes");
  const secondsEl = document.getElementById("seconds");
  const dateEl = document.getElementById("date");

  function updateClock(){
    const now = new Date();
    hoursEl.textContent = pad(now.getHours());
    minutesEl.textContent = pad(now.getMinutes());
    secondsEl.textContent = pad(now.getSeconds());
    const jpWeek = ["日","月","火","水","木","金","土"];
    dateEl.textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${jpWeek[now.getDay()]}）`;
  }

  updateClock();
  setInterval(updateClock, 1000);

  // もし「渋谷に秋の富士山を重ねる」合成を行いたい場合は、富士山の画像URLを教えてください。
</script>
</body>
</html>
