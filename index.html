<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untraceable Browser</title>
  <link rel="icon" href="https://aicreation-file.miricanvas.com/a00/production/private/txt2img/2026/05/23/14/cf83ba53-7234-47e7-9fc4-5e638a88062b.png">
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="darkVeil"></div>

  <!-- ダミー画面 -->
  <div id="dummyOverlay">
    <div class="dummy-logo"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></div>
    <div class="dummy-search-box">
      <span style="font-size:20px;color:#9aa0a6;">🔍</span>
      <input type="text" id="dummyInput" placeholder="" autocomplete="off">
    </div>
    <div class="dummy-search-btn-row">
      <button class="dummy-search-btn">Google 検索</button>
      <button class="dummy-search-btn">I'm Feeling Lucky</button>
    </div>
    <div class="dummy-hint">クリックまたは <kbd>Shift+Esc</kbd> で元の画面に戻る</div>
  </div>

  <!-- スクリーンセーバー -->
  <div id="screensaver">
    <div id="ssClock">00:00</div>
    <div id="ssDate"></div>
    <div id="ssHint">クリックまたはキーを押して復帰</div>
  </div>

  <!-- 更新情報モーダル -->
  <div id="historyOverlay">
    <div id="historyModal">
      <div id="historyModalHeader">
        <span>📋 アップデート情報・既知のバグ</span>
        <button id="historyModalClose">×</button>
      </div>
      <div id="historyModalBody">
        <iframe id="historyFrame" src="history.html"></iframe>
      </div>
    </div>
  </div>

  <div id="privacyStatus">待機中</div>
  <div id="favBar"></div>

  <!-- タブバー -->
  <div class="tabbar" id="tabbar">
    <div id="addTabBtn" title="新しいタブ">＋</div>
  </div>

  <!-- ナビバー -->
  <div class="navbar">
    <img id="logoImg" src="https://cdn.phototourl.com/free/2026-05-27-4d659095-dd46-430b-af9f-a5d9e74d9b22.png" alt="Logo" title="ホームに戻る">
    <div id="clock"></div>
    <button class="nbtn" id="refreshButton">↻</button>
    <input type="text" id="urlInput" placeholder="URLを入力してください">
    <button class="nbtn" id="goButton">GO</button>
    <button class="nbtn" id="bgButton">背景変更</button>
    <button class="nbtn" id="historyButton">更新情報</button>
    <button class="nbtn" id="resetButton">終了</button>
    <button id="panicBtn">偽装 [Esc]</button>
    <button id="filterBtn">覗き見防止</button>
    <button class="nbtn" id="memoToggleBtn" title="メモ">
      <img src="https://previews.123rf.com/images/sabuhinovruzov/sabuhinovruzov1706/sabuhinovruzov170600007/79390260-blank-paper-and-a-pen-vector-icon-black-and-white-illustration-of-note-pad-and-pen-outline-linear.jpg"
           style="height:18px;width:18px;object-fit:cover;vertical-align:middle;border-radius:2px;filter:invert(1);">
    </button>
    <button class="nbtn" id="menuButton">≡</button>
  </div>

  <!-- 背景メニュー -->
  <div id="bgMenu">
    <div class="bg-option" onclick="changeBg('https://custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit,fl_lossy,h_9000,w_1200,f_auto,q_auto/8103728/282569_954041.jpeg')">美しい山々(標準)</div>
    <div class="bg-option" onclick="changeBg('https://www.s-hoshino.com/wall/natu/001/001_1600_1200.jpg')">美しく反射する夕焼け</div>
    <div class="bg-option" onclick="changeBg('https://sapporotravel.s3-ap-northeast-1.amazonaws.com/st/ph/img/0e0b181e83ff20932f0b28cc7b711142.jpg')">札幌 大通公園</div>
    <div class="bg-option" onclick="changeBg('https://thumb.photo-ac.com/22/22fb220141738f2a7eb5a5d0376acca9_t.jpeg')">日本アルプス</div>
    <div class="bg-option" onclick="changeBg('https://img.magnific.com/free-photo/fuji-mountain-kawaguchiko-lake-morning-autumn-seasons-fuji-mountain-yamanachi-japan_335224-102.jpg?semt=ais_hybrid&w=740&q=80')">秋の富士山</div>
    <div class="bg-option" onclick="changeBg('https://sozai-free.com/wp-content/uploads/2021/06/1img_1989-scaled.jpg')">ノイシュヴァンシュタイン城</div>
  </div>

  <!-- ツールメニュー -->
  <div id="toolPopup">
    <p style="font-size:17px;margin-bottom:10px;">Tools</p>
    <p style="margin-bottom:5px;color:#aaa;font-size:12px;">proxy</p>
    <button id="gustBtn" onclick="window.open('https://html.cafe/x5141df3f')">🌪️ GUST</button>
    <hr>
    <p style="font-size:11px;color:#888;">超軽量な強力プロキシ</p>
  </div>

  <!-- コンテンツ -->
  <div id="mainContent">
    <div id="messageArea">
      <p style="font-size:42px;">Untraceable Browser</p>
      <p style="font-size:120%;margin-top:10px;">URLを入力して GO または Enter</p>
      <p style="margin-top:8px;opacity:0.6;font-size:13px;">iframeベース・履歴なし</p>
      <br>
      <p style="font-size:11px;opacity:0.4;">Ver.1.8.0</p>
    </div>
  </div>

  <!-- メモパネル -->
  <div id="memoPanel">
    <div id="memoHeader">
      <div id="memoHeaderLeft">
        <span id="memoTitle">📝 メモ</span>
        <span id="memoSaveStatus">未保存</span>
      </div>
      <button id="memoCloseBtn">×</button>
    </div>
    <div id="memoToolbar">
      <label>色：</label>
      <div class="color-swatch" style="background:#ffffff" data-color="#ffffff" title="白"></div>
      <div class="color-swatch" style="background:#ffeb3b" data-color="#ffeb3b" title="黄"></div>
      <div class="color-swatch" style="background:#ff7043" data-color="#ff7043" title="橙"></div>
      <div class="color-swatch" style="background:#ef5350" data-color="#ef5350" title="赤"></div>
      <div class="color-swatch" style="background:#66bb6a" data-color="#66bb6a" title="緑"></div>
      <div class="color-swatch" style="background:#42a5f5" data-color="#42a5f5" title="青"></div>
      <div class="color-swatch" style="background:#ce93d8" data-color="#ce93d8" title="紫"></div>
      <input type="color" id="colorPicker" value="#ffffff" title="カスタム">
      <label style="margin-left:4px;">サイズ：</label>
      <select id="fontSizeSelect">
        <option value="11px">11</option><option value="12px">12</option>
        <option value="13px">13</option><option value="14px" selected>14</option>
        <option value="16px">16</option><option value="18px">18</option>
        <option value="20px">20</option><option value="24px">24</option>
        <option value="28px">28</option><option value="32px">32</option>
      </select>
    </div>
    <div id="memoBody" contenteditable="true" spellcheck="false"></div>
    <div id="memoFooter">
      <button id="memoClearBtn">クリア</button>
      <span id="memoCharCount">0 文字</span>
      <button id="memoSaveBtn">💾 保存</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
